<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂💖</title>

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  text-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;

  /* BACKGROUND CERAH */
  background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
  background-size: 800% 800%;
  animation: gradientMove 15s ease infinite;
}

/* ANIMASI BACKGROUND */
@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* BUBBLE BACKGROUND */
.bubble {
  position:absolute;
  border-radius:50%;
  opacity:0.4;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {transform:translateY(100vh);}
  to {transform:translateY(-100vh);}
}

/* CONTAINER */
.container {
  z-index:2;
  max-width:600px;
}

/* FOTO */
#photo {
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:20px;
  opacity:0;
  transform:scale(0.8);
  transition:1s;
  box-shadow:0 0 25px rgba(255,255,255,0.8);
}

#photo.show {
  opacity:1;
  transform:scale(1);
}

/* TEXT */
.text {
  font-size:1.8rem;
  color:#fff;
  margin-bottom:20px;
  opacity:0;
  transform:translateY(20px);
  transition:0.7s;
}

.text.show {
  opacity:1;
  transform:translateY(0);
}

/* BUTTON */
button {
  padding:12px 20px;
  border:none;
  border-radius:30px;
  background:white;
  color:#e91e63;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.1);
}

/* CONFETTI */
.confetti {
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  animation: fall linear infinite;
}

@keyframes fall {
  from {transform:translateY(-10vh);}
  to {transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="container">
  <img id="photo" src="1.jpeg">
  <div id="text" class="text"></div>
  <button id="btn">lanjut</button>
</div>

<audio autoplay loop>
  <source src="lagu/romantis.mp3" type="audio/mpeg">
</audio>

<script>
const texts = [
  "Happy Birthday ya kamu 🎂✨",
  "Hari ini bukan hari biasa...",
  "karena ini hari dimana dunia dapet kamu 💖",
  "dan aku... dapet alasan buat senyum setiap hari 😄",
  "Makasih ya udah ada sejauh ini...",
  "udah jadi bagian paling indah di hidup aku 🌸",
  "Aku gak minta banyak di hari ini...",
  "cuma satu hal sederhana...",
  "tetap disini ya, sama aku 💞",
  "Hari ini, besok, dan seterusnya...",
  "Aku sayang kamu 🤍"
];

const photos = [
  "1.jpeg",
  "2.jpeg",
  "3.jpeg",
  "4.jpeg"
];

let index = 0;
const textEl = document.getElementById("text");
const btn = document.getElementById("btn");
const photo = document.getElementById("photo");

function showText() {
  textEl.classList.remove("show");

  setTimeout(() => {
    textEl.innerHTML = texts[index];
    textEl.classList.add("show");

    if(index >= 2){
      photo.classList.add("show");
      photo.src = photos[index % photos.length];
    }

    if(index === texts.length - 1){
      btn.style.display = "none";
      startConfetti();
    }

  }, 200);
}

btn.addEventListener("click", () => {
  index++;
  if(index < texts.length){
    showText();
  }
});

/* CONFETTI */
function startConfetti(){
  for(let i=0;i<60;i++){
    const c = document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},100%,60%)`;
    c.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(c);

    setTimeout(()=>c.remove(),4000);
  }
}

/* BUBBLES BACKGROUND */
function createBubbles(){
  for(let i=0;i<15;i++){
    const b=document.createElement("div");
    b.className="bubble";
    b.style.width=b.style.height=(Math.random()*60+20)+"px";
    b.style.left=Math.random()*100+"vw";
    b.style.background="white";
    b.style.animationDuration=(Math.random()*10+10)+"s";
    document.body.appendChild(b);
  }
}

createBubbles();
showText();
</script>

</body>
</html>
